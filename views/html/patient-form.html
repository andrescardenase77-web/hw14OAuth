<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Pacientes | Fábula Dental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/user-views.css">
    <link rel="stylesheet" href="../css/forms.css">
</head>

<body class="bg-light">
    <header class="bg-primary text-white shadow-sm">
        <h1 class="m-0 text-center py-3">Registro de Pacientes - Área Odontológica</h1>
    </header>

    <main class="form-container">
        <div class="form-card shadow-sm">
            <h2 class="text-primary fw-bold mb-4">Ingreso de Datos Personales</h2>

            <form action="../../controllers/patient-controller.php" method="POST" id="patientForm">
                <input type="hidden" name="action" value="create">
                <div class="form-grid">

                    <div class="input-group">
                        <label for="fullName">Nombre Completo</label>
                        <input type="text" id="fullName" name="fullName" required minlength="3" placeholder="Ej: Andrés Cárdenas">
                    </div>

                    <div class="input-group">
                        <label for="patientID">Cédula de Identidad</label>
                        <input type="text" id="patientID" name="patientID" required pattern="[0-9]{10}" placeholder="1727095414">
                    </div>

                    <div class="input-group">
                        <label for="birthday">Fecha de Nacimiento</label>
                        <input type="date" id="birthday" name="birthday" min="1900-01-01" max="2026-05-05" required>
                    </div>

                    <div class="input-group">
                        <label for="phone">Teléfono de Contacto</label>
                        <input type="tel" id="phone" name="phone" required pattern="[0-9]{10}" placeholder="0991234567">
                    </div>

                    <div class="input-group">
                        <label for="gender">Género</label>
                        <select id="gender" name="gender" required>
                            <option value="">Seleccione</option>
                            <option value="femenino">Femenino</option>
                            <option value="masculino">Masculino</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="legalRepresentative">Representante Legal (Opcional)</label>
                        <input type="text" id="legalRepresentative" name="legalRepresentative" placeholder="Obligatorio si es menor de edad">
                    </div>

                    <div class="input-group full-width">
                        <label for="reasonForConsultation">Motivo de la Consulta</label>
                        <input type="text" id="reasonForConsultation" name="reasonForConsultation" required minlength="5" placeholder="Ej: Dolor en molar inferior derecho">
                    </div>

                    <div class="full-width mt-3">
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Guardar Historia Clínica</button>
                    </div>

                    <div class="full-width d-flex gap-2 mt-2">
                        <a href="../php/patient-list.php" class="btn btn-secondary flex-grow-1">Ver Lista</a>
                        <a href="./dentist.html" class="btn btn-secondary flex-grow-1">Volver al Panel</a>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <script src="../js/patient-validation.js"></script>
</body>

</html>
